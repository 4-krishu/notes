name: notes
description: "Notes + Hidden Vault App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # STORAGE
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # DATE FORMAT
  intl: ^0.18.1

  # MEDIA PICKER (for vault later)
  image_picker: ^1.0.7

  # PATH (file storage)
  path_provider: ^2.1.2

  # PERMISSIONS (needed for gallery access)
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # HIVE CODE GENERATION
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true